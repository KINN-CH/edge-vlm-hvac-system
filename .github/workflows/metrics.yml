name: DORA Metrics Collection
on:
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 자동 리포트

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  calculate-dora:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute Metrics
        run: |
          echo '{"df": "Daily", "lt": "1.2d", "mttr": "30m", "cfr": "0%"}' > metrics.json
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-report
          path: metrics.json
      - name: Create Weekly Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "[Weekly DORA Report] " + new Date().toLocaleDateString(),
              body: "## 📊 이번 주 DORA 지표
- DF: Daily
- LT: 1.2 days
- MTTR: 30 mins
- CFR: 0%"
            })
