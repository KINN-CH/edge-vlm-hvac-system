name: DORA Metrics Collection

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  calculate-dora:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Calculate DORA Metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 week2/collect_metrics.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-report
          path: week2/dora_metrics.json

      - name: Create Weekly Issue Report
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const metrics = JSON.parse(fs.readFileSync('week2/dora_metrics.json', 'utf8'));
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Weekly DORA Report] ${metrics.collected_at}`,
              labels: ['dora-report'],
              body: `## 📊 DORA Metrics — ${metrics.collected_at}\n\n| 지표 | 값 |\n|------|----|\\n| 🚀 Deployment Frequency | ${metrics.deployment_frequency} |\n| ⏱ Lead Time for Changes | ${metrics.lead_time_for_changes} |\n| 🔥 Change Failure Rate | ${metrics.change_failure_rate} |\n| 🛠 MTTR | ${metrics.mttr} |\n\n> 자동 생성된 주간 리포트입니다.`
            });