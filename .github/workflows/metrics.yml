name: DORA Metrics Collection

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  calculate-dora:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Calculate DORA Metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 week2/collect_metrics.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dora-report
          path: week2/dora_metrics.json

      - name: Create Weekly DORA Report Issue
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const fs = require('fs');
              const path = require('path');
              
              // 메트릭 파일 확인
              if (!fs.existsSync('week2/dora_metrics.json')) {
                console.warn('⚠️ DORA metrics file not found');
                return;
              }
              
              const metrics = JSON.parse(fs.readFileSync('week2/dora_metrics.json', 'utf8'));
              const now = new Date();
              const dateStr = now.toISOString().split('T')[0];
              
              const reportBody = `# 📊 주간 DORA 메트릭 리포트\n\n**수집 일시:** ${dateStr}\n\n| 지표 | 값 | 평가 |\n|------|-----|------|\n| 🚀 배포 빈도 | ${metrics.deployment_frequency || 'N/A'} | 주 1회 이상 |\n| ⏱️ 변경 리드 타임 | ${metrics.lead_time_for_changes || 'N/A'} | 1주 이내 |\n| 🔥 변경 실패율 | ${metrics.change_failure_rate || 'N/A'} | 0-15% |\n| 🛠️ MTTR | ${metrics.mttr || 'N/A'} | 1시간 이내 |\n\n---\n\n## 📈 분석 결과\n\n자동 수집된 메트릭을 기반으로 팀의 배포 능력과 안정성을 평가합니다.\n\n> 💡 이 리포트는 매주 월요일 자동으로 생성됩니다.`;
              
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Weekly Report] DORA Metrics - ${dateStr}`,
                labels: ['weeky-report', 'dora-metrics'],
                body: reportBody
              });
              
              console.log(`✅ Report created: #${issue.data.number}`);
            } catch (error) {
              console.error('Failed to create weekly report:', error);
              throw error;
            }