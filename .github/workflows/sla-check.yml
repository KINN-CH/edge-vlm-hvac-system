name: SLA Issue Monitoring & Auto Response

# 5분마다 자동 실행, 수동 실행도 가능
on:
  schedule:
    - cron: "*/5 * * * *"  
  workflow_dispatch:
  issues:
    types: [opened]

jobs:
  sla-check:
    runs-on: ubuntu-latest

    steps:
      - name: SLA / Issue check
        uses: actions/github-script@v6
        with:
          script: |
            const slaHours = 24;

            // 1️⃣ 새로 생성된 Issue에 자동 댓글
            if (context.payload.action === "opened") {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "👋 이슈가 등록되었습니다!\n담당자가 곧 확인할 예정입니다. 감사합니다 🙏"
              });
            }

            // 2️⃣ SLA 체크: 24시간 이상 댓글 없는 Issue 탐색
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open"
            });

            const now = new Date();

            for (const issue of issues) {
              const lastComment = issue.comments > 0 
                ? (await github.rest.issues.listComments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number
                  })).data.slice(-1)[0].created_at
                : issue.created_at;

              const lastCommentDate = new Date(lastComment);
              const diffHours = (now - lastCommentDate) / 1000 / 60 / 60;

              if (diffHours > slaHours) {
                github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `⏰ SLA Alert: 이슈가 ${slaHours}시간 이상 응답 없이 열려 있습니다!`
                });
              }
            }

      - name: Log completion
        run: echo "✅ SLA & Auto Response workflow completed."