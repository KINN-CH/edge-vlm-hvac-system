name: SLA Monitoring & Issue Tracking

on:
  schedule:
    - cron: "0 */6 * * *"  # 6시간마다 실행
  workflow_dispatch:

permissions:
  issues: write

jobs:
  monitor-sla:
    runs-on: ubuntu-latest

    steps:
      - name: Check SLA compliance
        uses: actions/github-script@v7
        with:
          script: |
            const slaHours = 24;
            const warningHours = 12;
            
            try {
              // 1️⃣ 모든 오픈 이슈 조회
              const issues = await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page: 100
                }
              );

              const now = new Date();
              let violations = [];
              let warnings = [];

              for (const issue of issues) {
                // Issue 본문에 자동 응답 제외 라벨이 없으면 체크
                if (issue.labels.some(l => l.name === 'no-sla-check')) {
                  continue;
                }

                // 마지막 댓글 시간 확인
                const lastComment = issue.comments > 0 
                  ? (await github.rest.issues.listComments({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      per_page: 1
                    })).data[0].created_at
                  : issue.created_at;

                const lastCommentDate = new Date(lastComment);
                const diffHours = (now - lastCommentDate) / (1000 * 60 * 60);

                if (diffHours > slaHours) {
                  violations.push({
                    number: issue.number,
                    title: issue.title,
                    hours: Math.round(diffHours)
                  });
                } else if (diffHours > warningHours) {
                  warnings.push({
                    number: issue.number,
                    title: issue.title,
                    hours: Math.round(diffHours)
                  });
                }
              }

              // 2️⃣ SLA 위반 이슈 처리
              for (const violation of violations) {
                const hasAlert = (await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: violation.number
                })).data.some(c => c.body.includes('SLA Alert'));

                if (!hasAlert) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: violation.number,
                    body: `🚨 **SLA 위반 알림**\n\n이 이슈가 **${violation.hours}시간** 동안 응답 없이 열려 있습니다.\n\n담당자가 즉시 확인 부탁드립니다.`
                  });
                  
                  // 라벨 추가
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: violation.number,
                    labels: ['sla-violated']
                  });
                }
              }

              // 3️⃣ 상태 출력
              console.log(`\n📊 SLA Status Report:\n`);
              console.log(`✅ Compliant: ${issues.length - violations.length - warnings.length}`);
              console.log(`⚠️  Warning (${warningHours}h+): ${warnings.length}`);
              console.log(`🚨 Violations (${slaHours}h+): ${violations.length}`);
              
            } catch (error) {
              console.error('SLA Check failed:', error);
              throw error;
            }