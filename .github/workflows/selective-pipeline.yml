name: Selective Deploy Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 변경 파일 감지 ────────────────────────────────────────────────────────
  detect-changes:
    name: "변경 파일 감지"
    runs-on: ubuntu-latest
    outputs:
      vlm:        ${{ steps.changes.outputs.vlm }}
      control:    ${{ steps.changes.outputs.control }}
      energy:     ${{ steps.changes.outputs.energy }}
      workflows:  ${{ steps.changes.outputs.workflows }}
      docs:       ${{ steps.changes.outputs.docs }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 변경 파일 분류
        id: changes
        run: |
          git diff --name-only HEAD~1 HEAD > changed.txt || git diff --name-only origin/main HEAD > changed.txt
          cat changed.txt

          # VLM / YOLO / Motion 관련
          if grep -qE "vlm_processor\.py|yolo_detector\.py|motion_detector\.py" changed.txt; then
            echo "vlm=true" >> $GITHUB_OUTPUT
          else
            echo "vlm=false" >> $GITHUB_OUTPUT
          fi

          # 제어 로직 관련
          if grep -qE "pid_controller\.py|state_machine\.py|thermal_engine\.py|hvac_simulator\.py" changed.txt; then
            echo "control=true" >> $GITHUB_OUTPUT
          else
            echo "control=false" >> $GITHUB_OUTPUT
          fi

          # 에너지/센서/날씨 관련
          if grep -qE "energy_monitor\.py|sensor_interface\.py|weather_service\.py|air_quality_service\.py" changed.txt; then
            echo "energy=true" >> $GITHUB_OUTPUT
          else
            echo "energy=false" >> $GITHUB_OUTPUT
          fi

          # 워크플로우 파일 자체 변경
          if grep -qE "^\.github/" changed.txt; then
            echo "workflows=true" >> $GITHUB_OUTPUT
          else
            echo "workflows=false" >> $GITHUB_OUTPUT
          fi

          # 문서 변경
          if grep -qE "\.(md|txt)$|^docs/" changed.txt; then
            echo "docs=true" >> $GITHUB_OUTPUT
          else
            echo "docs=false" >> $GITHUB_OUTPUT
          fi

  # ── VLM 모듈 변경 시만 실행 ─────────────────────────────────────────────
  test-vlm:
    name: "VLM 모듈 검증"
    needs: detect-changes
    if: needs.detect-changes.outputs.vlm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env
      - name: VLM 프로세서 임포트 검증
        run: |
          python -c "from vlm_processor import VLMProcessor; print('VLMProcessor 구조 OK')"
          python -c "
          from vlm_processor import VLMProcessor
          assert hasattr(VLMProcessor, 'CLO_BASE')
          assert hasattr(VLMProcessor, 'MET_MAP')
          assert hasattr(VLMProcessor, 'ROOM_SIZE_MAP')
          print('VLMProcessor 속성 검증 완료')
          "

  # ── 제어 로직 변경 시만 실행 ────────────────────────────────────────────
  test-control:
    name: "제어 로직 검증"
    needs: detect-changes
    if: needs.detect-changes.outputs.control == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env
      - name: PMV + PID 통합 검증
        run: |
          python - <<'EOF'
          from thermal_engine import ThermalEngine
          from pid_controller import PIDController
          from state_machine import StateManager, SystemState

          engine = ThermalEngine()
          pid    = PIDController(kp=0.8, ki=0.05, kd=0.3)
          sm     = StateManager()

          # 시나리오: 도착 → STEADY
          state = sm.update(people_count=1)
          assert state == SystemState.ARRIVAL

          # PMV 계산
          pmv = engine.calculate_pmv(22.0, 22.0, 50.0, 0.3, 1.0, 1.0)
          assert -3 <= pmv <= 3

          # PID 출력
          out = pid.compute(pmv)
          assert -3.0 <= out <= 3.0

          print(f"통합 검증 완료 | PMV={pmv:.3f}, PID={out:.3f}, State={state.value}")
          EOF

  # ── 에너지/날씨 변경 시만 실행 ──────────────────────────────────────────
  test-energy:
    name: "에너지 & 날씨 모듈 검증"
    needs: detect-changes
    if: needs.detect-changes.outputs.energy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-env
      - name: EnergyMonitor 검증
        run: |
          python - <<'EOF'
          from energy_monitor import EnergyMonitor
          em = EnergyMonitor()
          em.tick(is_on=True, fan_speed=2, people_count=3)
          assert em.get_energy_kwh() >= 0
          assert 0 <= em.get_comfort_rate() <= 100
          print(f"EnergyMonitor OK | {em.get_energy_kwh():.6f} kWh")
          EOF

  # ── 결과 요약 ────────────────────────────────────────────────────────────
  summary:
    name: "파이프라인 결과 요약"
    needs: [detect-changes, test-vlm, test-control, test-energy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 실행 결과 출력
        run: |
          echo "## 선택적 파이프라인 실행 결과"
          echo "VLM 변경:     ${{ needs.detect-changes.outputs.vlm }}"
          echo "제어 변경:    ${{ needs.detect-changes.outputs.control }}"
          echo "에너지 변경:  ${{ needs.detect-changes.outputs.energy }}"
          echo "문서 변경:    ${{ needs.detect-changes.outputs.docs }}"
