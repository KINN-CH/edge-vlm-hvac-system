name: Reusable — Lint & Import Check

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
    outputs:
      cache-hit:
        description: "pip 캐시 히트 여부"
        value: ${{ jobs.check.outputs.cache-hit }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.setup.outputs.cache-hit }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 환경 설정 (Composite Action)
        id: setup
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ inputs.python-version }}

      - name: 핵심 모듈 임포트 검증
        run: |
          python -c "from thermal_engine import ThermalEngine; print('thermal_engine OK')"
          python -c "from pid_controller import PIDController; print('pid_controller OK')"
          python -c "from state_machine import StateManager; print('state_machine OK')"
          python -c "from energy_monitor import EnergyMonitor; print('energy_monitor OK')"
          python -c "from motion_detector import MotionDetector; print('motion_detector OK')"
          python -c "from yolo_detector import YOLODetector; print('yolo_detector OK')"
          python -c "from sensor_interface import SensorInterface; print('sensor_interface OK')"

      - name: PMV 계산 단위 테스트
        run: |
          python - <<'EOF'
          from thermal_engine import ThermalEngine
          engine = ThermalEngine()
          pmv = engine.calculate_pmv(ta=22.0, tr=22.0, rh=50.0, vel=0.1, met=1.0, clo=1.0)
          assert -3.0 <= pmv <= 3.0, f"PMV 범위 초과: {pmv}"
          print(f"PMV 테스트 통과: {pmv:.3f}")
          EOF

      - name: PID 제어기 단위 테스트
        run: |
          python - <<'EOF'
          from pid_controller import PIDController
          pid = PIDController(kp=0.8, ki=0.05, kd=0.3)
          out = pid.compute(1.5)
          assert -3.0 <= out <= 3.0, f"PID 출력 범위 초과: {out}"
          pid.reset()
          out_zero = pid.compute(0.0)
          assert abs(out_zero) < 0.12, f"Deadband 미적용: {out_zero}"
          print(f"PID 테스트 통과: {out:.3f}, deadband: {out_zero:.3f}")
          EOF
