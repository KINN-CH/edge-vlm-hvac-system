name: Issue Auto Response

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-respond:
    runs-on: ubuntu-latest

    steps:
      - name: Add welcome comment to new issue
        uses: actions/github-script@v7
        with:
          script: |
            try {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `👋 이슈가 등록되었습니다!\n\n📋 **체크리스트:**\n- [ ] 버전 정보 포함 여부 확인\n- [ ] 재현 단계 명확히 작성\n- [ ] 스크린샷/로그 첨부\n\n담당자가 곧 확인할 예정입니다. 감사합니다 🙏`
              });
            } catch (error) {
              console.error('Failed to add comment:', error);
              throw error;
            }