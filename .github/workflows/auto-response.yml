name: Auto Response to Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write   # 🔥 이거 추가!!

jobs:
  auto-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Add comment to new issue
        uses: actions/github-script@v7   # 🔥 v7 추천 (최신)
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "👋 이슈가 등록되었습니다!\n\n담당자가 곧 확인할 예정입니다. 감사합니다 🙏"
            })