name: CI — Matrix 확장 테스트

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements_mac.txt"
  pull_request:
    branches: [main]
    paths:
      - "**.py"
      - "requirements_mac.txt"

jobs:
  # ── Matrix 테스트: Python 버전 × OS 조합 ────────────────────────────────
  matrix-test:
    name: "Test py${{ matrix.python-version }} / ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
        os: [ubuntu-latest, macos-latest]
        exclude:
          # macos + 3.10 조합은 MPS 미지원으로 제외
          - os: macos-latest
            python-version: "3.10"

    runs-on: ${{ matrix.os }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 캐시 시작 시각 기록
        id: time-start
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: 환경 설정 (Composite Action)
        id: setup
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: 캐시 결과 및 소요 시간 출력
        run: |
          end=$(date +%s)
          start=${{ steps.time-start.outputs.start }}
          echo "⏱ 의존성 설치 소요: $((end - start))초"
          echo "💾 캐시 히트: ${{ steps.setup.outputs.cache-hit }}"

      - name: Reusable Workflow 호출
        uses: ./.github/workflows/reusable-setup.yml
        with:
          python-version: ${{ matrix.python-version }}

  # ── 캐시 효과 측정 전용 Job ─────────────────────────────────────────────
  cache-benchmark:
    name: "캐시 효과 측정 (Ubuntu / py3.11)"
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: [측정] 캐시 없이 설치 (cold run 시뮬)
        id: cold
        run: |
          start=$(date +%s)
          pip install --upgrade pip torch torchvision --index-url https://download.pytorch.org/whl/cpu -q
          pip install -r requirements_mac.txt -q
          end=$(date +%s)
          echo "cold_sec=$((end-start))" >> $GITHUB_OUTPUT

      - name: pip 캐시 복원
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-benchmark-ubuntu-py3.11-${{ hashFiles('requirements_mac.txt') }}

      - name: [측정] 캐시 있는 상태에서 설치 (warm run)
        id: warm
        run: |
          start=$(date +%s)
          pip install --upgrade pip torch torchvision --index-url https://download.pytorch.org/whl/cpu -q
          pip install -r requirements_mac.txt -q
          end=$(date +%s)
          echo "warm_sec=$((end-start))" >> $GITHUB_OUTPUT

      - name: 캐시 효과 리포트 출력
        run: |
          cold=${{ steps.cold.outputs.cold_sec }}
          warm=${{ steps.warm.outputs.warm_sec }}
          if [ "$cold" -gt 0 ]; then
            improvement=$(( (cold - warm) * 100 / cold ))
            echo "📊 캐시 효과 리포트"
            echo "   Cold run : ${cold}초"
            echo "   Warm run : ${warm}초"
            echo "   개선율   : ${improvement}%"
          fi
