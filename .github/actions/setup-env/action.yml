name: "Setup Python Environment"
description: "Python 버전 설정 + pip 캐시 복원 + 의존성 설치 (Composite Action)"

inputs:
  python-version:
    description: "Python 버전"
    required: false
    default: "3.11"

outputs:
  cache-hit:
    description: "pip 캐시 히트 여부"
    value: ${{ steps.pip-cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Python 설정
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: pip 캐시 경로 확인
      id: pip-cache-dir
      shell: bash
      run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

    - name: pip 캐시 복원
      id: pip-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.pip-cache-dir.outputs.dir }}
        key: pip-${{ runner.os }}-py${{ inputs.python-version }}-${{ hashFiles('requirements_mac.txt') }}
        restore-keys: |
          pip-${{ runner.os }}-py${{ inputs.python-version }}-

    - name: 의존성 설치
      shell: bash
      run: |
        pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
        pip install -r requirements_mac.txt
